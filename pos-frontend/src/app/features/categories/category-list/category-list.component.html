<div class="app-page">
  <app-page-header [title]="'CATEGORIES.TITLE' | translate" [subtitle]="'CATEGORIES.SUBTITLE' | translate">
    <button mat-flat-button type="button" (click)="openDialog()">{{ 'CATEGORIES.ADD' | translate }}</button>
  </app-page-header>
  <div class="app-card">
    <div class="app-table-wrap" *ngIf="categories.length; else empty">
      <table class="app-data-table">
        <thead><tr><th>{{ 'CATEGORIES.NAME' | translate }}</th><th>{{ 'CATEGORIES.DESCRIPTION' | translate }}</th><th>{{ 'COMMON.STATUS' | translate }}</th><th>{{ 'COMMON.ACTIONS' | translate }}</th></tr></thead>
        <tbody>
          <tr *ngFor="let c of categories">
            <td>{{ c.name }}</td>
            <td>{{ c.description }}</td>
            <td>{{ (c.active !== false ? 'COMMON.ACTIVE' : 'COMMON.INACTIVE') | translate }}</td>
            <td>
              <button class="app-icon-btn" type="button" (click)="openDialog(c)"><span class="material-icons">edit</span></button>
              <button class="app-icon-btn danger" type="button" (click)="deleteCategory(c)"><span class="material-icons">delete</span></button>
            </td>
          </tr>
        </tbody>
      </table>
      <app-table-pager [length]="total" [pageSize]="pageSize" [pageIndex]="pageIndex" (pageIndexChange)="pageIndex=$event; load()"></app-table-pager>
    </div>
    <ng-template #empty><app-empty-state *ngIf="!loading"></app-empty-state></ng-template>
  </div>
  <app-loading-spinner *ngIf="loading" [contained]="true"></app-loading-spinner>
</div>
