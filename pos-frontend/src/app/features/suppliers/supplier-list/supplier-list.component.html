<div class="app-page">
  <app-page-header [title]="'SUPPLIERS.TITLE' | translate" [subtitle]="'SUPPLIERS.SUBTITLE' | translate">
    <button mat-flat-button type="button" (click)="openDialog()">{{ 'SUPPLIERS.ADD' | translate }}</button>
  </app-page-header>
  <div class="app-card">
    <div class="app-table-wrap" *ngIf="suppliers.length; else empty">
      <table class="app-data-table">
        <thead><tr><th>{{ 'SUPPLIERS.NAME' | translate }}</th><th>{{ 'SUPPLIERS.PHONE' | translate }}</th><th>{{ 'COMMON.ACTIONS' | translate }}</th></tr></thead>
        <tbody>
          <tr *ngFor="let s of suppliers">
            <td>{{ s.name }}</td><td>{{ s.phone }}</td>
            <td>
              <button class="app-icon-btn" type="button" (click)="openDialog(s)"><span class="material-icons">edit</span></button>
              <button class="app-icon-btn danger" type="button" (click)="deleteSupplier(s)"><span class="material-icons">delete</span></button>
            </td>
          </tr>
        </tbody>
      </table>
      <app-table-pager [length]="total" [pageSize]="pageSize" [pageIndex]="pageIndex" (pageIndexChange)="pageIndex=$event; load()"></app-table-pager>
    </div>
    <ng-template #empty><app-empty-state *ngIf="!loading"></app-empty-state></ng-template>
  </div>
  <app-loading-spinner *ngIf="loading" [contained]="true"></app-loading-spinner>
</div>
