<div class="app-page">
  <app-page-header [title]="'CUSTOMERS.TITLE' | translate" [subtitle]="'CUSTOMERS.SUBTITLE' | translate">
    <button mat-flat-button type="button" (click)="openDialog()">{{ 'CUSTOMERS.ADD' | translate }}</button>
  </app-page-header>
  <div class="app-card">
    <div class="app-table-wrap" *ngIf="customers.length; else empty">
      <table class="app-data-table">
        <thead><tr><th>{{ 'CUSTOMERS.NAME' | translate }}</th><th>{{ 'CUSTOMERS.PHONE' | translate }}</th><th>{{ 'CUSTOMERS.EMAIL' | translate }}</th><th>{{ 'COMMON.ACTIONS' | translate }}</th></tr></thead>
        <tbody>
          <tr *ngFor="let c of customers">
            <td>{{ c.name }}</td><td>{{ c.phone }}</td><td>{{ c.email }}</td>
            <td>
              <button class="app-icon-btn" type="button" (click)="openDialog(c)"><span class="material-icons">edit</span></button>
              <button class="app-icon-btn danger" type="button" (click)="deleteCustomer(c)"><span class="material-icons">delete</span></button>
            </td>
          </tr>
        </tbody>
      </table>
      <app-table-pager [length]="total" [pageSize]="pageSize" [pageIndex]="pageIndex" (pageIndexChange)="pageIndex=$event; load()"></app-table-pager>
    </div>
    <ng-template #empty><app-empty-state *ngIf="!loading"></app-empty-state></ng-template>
  </div>
  <app-loading-spinner *ngIf="loading" [contained]="true"></app-loading-spinner>
</div>
